<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Vending Machine Logo -->
  <rect x="40" y="20" width="120" height="160" rx="8" fill="#F59E0B" stroke="#D97706" stroke-width="3"/>

  <!-- Display Screen -->
  <rect x="55" y="35" width="90" height="40" rx="4" fill="#1F2937" stroke="#374151" stroke-width="2"/>
  <text x="100" y="60" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F59E0B" text-anchor="middle">VENDING</text>

  <!-- Product Grid -->
  <g>
    <!-- Row 1 -->
    <rect x="55" y="85" width="20" height="20" rx="2" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <rect x="80" y="85" width="20" height="20" rx="2" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <rect x="105" y="85" width="20" height="20" rx="2" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <rect x="130" y="85" width="20" height="20" rx="2" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>

    <!-- Row 2 -->
    <rect x="55" y="110" width="20" height="20" rx="2" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <rect x="80" y="110" width="20" height="20" rx="2" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <rect x="105" y="110" width="20" height="20" rx="2" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <rect x="130" y="110" width="20" height="20" rx="2" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>

    <!-- Row 3 -->
    <rect x="55" y="135" width="20" height="20" rx="2" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <rect x="80" y="135" width="20" height="20" rx="2" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <rect x="105" y="135" width="20" height="20" rx="2" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <rect x="130" y="135" width="20" height="20" rx="2" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  </g>

  <!-- Dispenser -->
  <rect x="70" y="160" width="60" height="15" rx="3" fill="#1F2937" stroke="#374151" stroke-width="2"/>
</svg>
